name: Lint & Code Quality

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]
  workflow_dispatch:
    
jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8
    
    - name: Validate Python syntax on main.py
      run: python -m py_compile main.py
    
    - name: Run pylint on main.py
      run: pylint main.py --disable=fixme,missing-module-docstring --fail-under=8.0
      continue-on-error: true
    
    - name: Run flake8 on main.py
      run: flake8 main.py --max-line-length=150 --ignore=E501,W503
      continue-on-error: true
